<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ADAUI Studio — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="icon" type="image/svg+xml" href="assets/logo-vertical-dark.svg" />
<script type="module" src="assets/model-viewer.min.js"></script>
<style>
  :root{
    --bg:#0E0820;
    --bg-elev:#150E2A;
    --bg-card:#1A1235;
    --line:rgba(255,255,255,0.08);
    --line-strong:rgba(255,255,255,0.16);
    --fg:#F9FAFB;
    --fg-dim:rgba(249,250,251,0.62);
    --fg-mute:rgba(249,250,251,0.38);
    --indigo:#4F46E5;
    --indigo-soft:#7C76EE;
    --indigo-50:#E0E7FF;
    --indigo-glow: rgba(79,70,229,0.45);
    --radius:18px;
    --radius-lg:28px;
    --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--fg); font-family:'Outfit', system-ui, sans-serif; -webkit-font-smoothing:antialiased; font-feature-settings:'ss01' on, 'ss02' on; overflow:hidden; height:100%;}
  body{ cursor:none; --mx: 50vw; --my: 50vh;}
  @media (hover: none){ body{ cursor:auto;} }
  a{color:inherit; text-decoration:none;}
  button{font:inherit; color:inherit; background:none; border:0; cursor:pointer;}
  img,svg{display:block; max-width:100%;}
  ::selection{ background:var(--indigo); color:var(--fg);}

  /* ───────────── custom cursor (spotlight blob) ───────────── */
  .cursor-dot, .cursor-ring, .cursor-glow{ position:fixed; top:0; left:0; pointer-events:none; }
  .cursor-dot{
    width:8px; height:8px; background:#fff; border-radius:50%;
    transform:translate3d(var(--mx), var(--my), 0) translate(-50%,-50%);
    z-index:9999;
    box-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 24px rgba(124,118,238,0.7), 0 0 60px rgba(79,70,229,0.5);
    transition: width .2s var(--ease), height .2s var(--ease), background .2s var(--ease);
  }
  .cursor-ring{
    width:42px; height:42px; border:1px solid rgba(255,255,255,0.4); border-radius:50%;
    transform: translate3d(var(--rx), var(--ry), 0) translate(-50%,-50%);
    z-index:9998;
    transition: width .3s var(--ease), height .3s var(--ease), border-color .3s var(--ease), background .3s var(--ease);
    mix-blend-mode: difference;
  }
  .cursor-ring.is-hover{ width:84px; height:84px; border-color:rgba(255,255,255,0.85); background:rgba(255,255,255,0.04); }
  .cursor-ring.is-click{ width:28px; height:28px; }
  .cursor-ring[data-label]::after{ content:attr(data-label); position:absolute; inset:0; display:grid; place-items:center; font-size:11px; letter-spacing:.06em; font-weight:500; color:#fff; text-transform:uppercase; opacity:0; transition:opacity .2s var(--ease);}
  .cursor-ring.is-hover[data-label]::after{ opacity:1; }

  @media (hover: none){ .cursor-dot,.cursor-ring{ display:none;} }

  /* ───────────── dot-grid background (lit by cursor) ───────────── */
  .dot-grid{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.18) 1.2px, transparent 1.6px);
    background-size: 28px 28px;
    background-position: center center;
    -webkit-mask-image: radial-gradient(circle 420px at var(--mx) var(--my), #000 0%, rgba(0,0,0,0.55) 35%, rgba(0,0,0,0.15) 65%, transparent 100%);
            mask-image: radial-gradient(circle 420px at var(--mx) var(--my), #000 0%, rgba(0,0,0,0.55) 35%, rgba(0,0,0,0.15) 65%, transparent 100%);
  }
  .dot-grid::before{
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(circle, rgba(124,118,238,0.55) 1.4px, transparent 1.8px);
    background-size: 28px 28px;
    background-position: center center;
    -webkit-mask-image: radial-gradient(circle 220px at var(--mx) var(--my), #000 0%, rgba(0,0,0,0.6) 40%, transparent 100%);
            mask-image: radial-gradient(circle 220px at var(--mx) var(--my), #000 0%, rgba(0,0,0,0.6) 40%, transparent 100%);
  }

  /* ───────────── grain ───────────── */
  .grain{ position:fixed; inset:0; pointer-events:none; z-index:200; opacity:.06; mix-blend-mode:overlay; background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45IiBudW1PY3RhdmVzPSIyIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsdGVyPSJ1cmwoI24pIiBvcGFjaXR5PSIwLjg1Ii8+PC9zdmc+");}

  /* ───────────── layout helpers ───────────── */
  .wrap{ max-width:1440px; margin:0 auto; padding:0 32px; }

  /* ───────────── nav ───────────── */
  nav.top{ position:fixed; top:24px; left:0; right:0; z-index:80; pointer-events:none; }
  .nav-row{ display:flex; justify-content:space-between; align-items:center; padding: 0 32px; pointer-events:none;}
  .nav-row > *{ pointer-events:auto; }
  .nav-brand{ display:inline-flex; align-items:center; gap:10px; padding:10px 14px 10px 10px; background:rgba(14,14,22,0.55); backdrop-filter:blur(16px) saturate(1.2); -webkit-backdrop-filter:blur(16px) saturate(1.2); border:1px solid var(--line); border-radius:14px; font-weight:600; letter-spacing:.02em; color:var(--fg);}
  .nav-brand .mark{ width:24px; height:24px;}
  .nav-right{ display:flex; gap:8px;}
  .nav-cta{ display:inline-flex; align-items:center; justify-content:center; height:54px; border-radius:14px; border:1px solid var(--line); background:rgba(14,14,22,0.55); backdrop-filter:blur(16px) saturate(1.2); -webkit-backdrop-filter:blur(16px) saturate(1.2); transition: background .25s var(--ease), color .25s var(--ease), border-color .25s var(--ease);}
  .nav-cta{ padding: 0 22px 0 24px; background: var(--indigo); border-color: var(--indigo); color:#fff; font-weight:600; font-size:14px; letter-spacing:.04em; text-transform:uppercase; gap:14px;}
  .nav-cta:hover{ background:#fff; color:#0A0A0F; border-color:#fff;}
  .nav-cta .arr{ width:32px; height:32px; background:#fff; color:var(--indigo); border-radius:8px; display:grid; place-items:center; transition: background .25s var(--ease), color .25s var(--ease);}
  .nav-cta:hover .arr{ background:var(--indigo); color:#fff;}

  /* logo mark (re-usable) */
  .mark{ width:28px; height:28px; display:inline-block; }

  /* ───────────── hero ───────────── */
  header.hero{
    position:relative; width:100%; height:100vh;
    overflow:hidden;
  }
  .hero-bg{
    position:absolute; inset:0; pointer-events:none; z-index:0;
    background: transparent;
  }
  .hero-rays{
    position:absolute; top:-40%; right:-10%; width:80%; height:160%; pointer-events:none; z-index:0;
    background:
      linear-gradient(110deg, transparent 40%, rgba(124,118,238,0.10) 50%, transparent 60%),
      linear-gradient(118deg, transparent 45%, rgba(255,255,255,0.06) 52%, transparent 60%);
    transform: rotate(8deg);
    filter: blur(3px);
    mix-blend-mode: screen;
  }
  .stars{ position:absolute; inset:0; pointer-events:none; z-index:0; opacity:.9;}
  .stars i{ position:absolute; width:2px; height:2px; border-radius:50%; background:#fff; opacity:.5; animation: twinkle 3s ease-in-out infinite;}
  @keyframes twinkle{ 0%,100%{ opacity:.18;} 50%{ opacity:.7;} }
  .hero-grid-bg{
    position:absolute; inset:0; pointer-events:none; z-index:0; opacity:.35;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
  }
  .hero-inner{ position:relative; z-index:2; height:100%; padding: 32px;}

  /* eyebrow chip */
  .chip{ display:inline-flex; align-items:center; gap:12px; padding:10px 16px; border:1px solid var(--line); border-radius:12px; background:rgba(14,14,22,0.5); backdrop-filter:blur(10px); font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--fg-dim); font-weight:500;}
  .chip .sq{ width:10px; height:10px; background:var(--indigo); border-radius:2px;}
  .chip .pulse-sq{ position:relative; border-radius:50%; box-shadow:0 0 0 0 rgba(79,70,229,0.7); animation: pulseDot 2s ease-out infinite;}
  @keyframes pulseDot{ 0%{ box-shadow:0 0 0 0 rgba(79,70,229,0.7);} 70%{ box-shadow:0 0 0 12px rgba(79,70,229,0);} 100%{ box-shadow:0 0 0 0 rgba(79,70,229,0);} }

  /* hero foot strip */
  .hero-footstrip{ position:absolute; left:32px; right:32px; bottom:16px; z-index:3; display:flex; justify-content:space-between; align-items:center; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--fg-mute); pointer-events:none;}
  .hero-footstrip .foot-item{ display:inline-flex; align-items:center; gap:10px;}
  .hero-footstrip .foot-center{ position:absolute; left:50%; transform:translateX(-50%);}
  .hero-footstrip .dot{ width:6px; height:6px; border-radius:50%; background:#22c55e; box-shadow:0 0 12px rgba(34,197,94,0.7);}
  @media (max-width: 720px){
    .hero-footstrip{ flex-direction:column; gap:6px; align-items:flex-start;}
    .hero-footstrip .foot-center{ position:static; transform:none;}
  }

  /* centered stack: mark + headline */
  .hero-stack{
    position:absolute; inset:0; z-index:2;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: clamp(14px, 2.5vh, 32px);
    padding: 0 32px;
    text-align:center;
  }
  .hero-stack .hero-right{ max-width:560px;}
  .hero-stack .hero-right p{ font-size: clamp(13px, 1.4vw, 16px); line-height:1.6; color:var(--fg-dim);}
  .hero-content-group{ display:flex; flex-direction:column; align-items:center; gap: clamp(12px, 2vh, 24px); text-align:center;}

  h1.display{
    font-weight:600;
    font-size: clamp(28px, 4.5vw, 68px);
    line-height: 0.96;
    letter-spacing:-0.04em;
    text-transform: uppercase;
    text-align:center;
  }
  h1.display .line{ display:block; }
  h1.display .accent{ color:var(--indigo-soft); }
  @media (max-width: 980px){
    h1.display{ font-size: clamp(28px, 7vw, 52px); letter-spacing:-0.03em;}
  }

  /* ───────────── 3D model hero ───────────── */
  .hero-model-wrap{
    position: relative;
    z-index: 1;
    display: flex; justify-content: center; align-items: center;
    flex-shrink: 0;
  }
  .hero-model-wrap .model-glow{
    position:absolute; inset:-10%; border-radius:50%;
    background: radial-gradient(circle, rgba(79,70,229,0.55), transparent 65%);
    filter: blur(55px);
    z-index: -1;
    pointer-events: none;
  }
  model-viewer.hero-model {
    width: min(38vmin, 38vh, 380px);
    height: min(38vmin, 38vh, 380px);
    background: transparent;
    --progress-bar-color: transparent;
    --progress-mask: transparent;
    opacity: 0;
    transition: opacity .8s var(--ease-out);
  }
  model-viewer.hero-model.model-ready { opacity: 1; }

  /* poster shown while GLB loads */
  .model-poster {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
  }
  .model-poster svg {
    width: 52%; height: 52%;
    filter: drop-shadow(0 0 28px rgba(79,70,229,0.7));
    animation: posterPulse 2s ease-in-out infinite;
  }
  @keyframes posterPulse {
    0%,100% { opacity: .55; transform: scale(1); }
    50%      { opacity: .9;  transform: scale(1.04); }
  }

  .reveal-char{ display:inline-block; transform: translateY(110%); opacity:0;}
  .revealed .reveal-char{ animation: rise .9s var(--ease-out) forwards; animation-delay: calc(var(--i) * 22ms);}
  @keyframes rise{ to{ transform:translateY(0); opacity:1;} }

  /* ───────────── reveal observer ───────────── */
  .r-up{ transform: translateY(40px); opacity:0; transition: transform 1.1s var(--ease-out), opacity 1.1s var(--ease-out);}
  .r-up.in{ transform: translateY(0); opacity:1;}
  .r-up.delay-1{ transition-delay:.1s;}
  .r-up.delay-2{ transition-delay:.2s;}
  .r-up.delay-3{ transition-delay:.3s;}

  /* ───────────── loading screen ───────────── */
  #loadScreen{
    position:fixed; inset:0; z-index:99999;
    background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px;
    transition: opacity .9s var(--ease-out), transform .9s var(--ease-out);
  }
  #loadScreen.done{
    opacity:0; transform:scale(1.04); pointer-events:none;
  }

  .ls-mark-wrap{
    position:relative;
    width:96px; height:96px;
    display:flex; align-items:center; justify-content:center;
  }
  .ls-mark{
    width:56px; height:56px;
    filter: drop-shadow(0 0 18px rgba(79,70,229,0.8)) drop-shadow(0 0 40px rgba(79,70,229,0.4));
    animation: lsPulse 2s ease-in-out infinite;
  }
  @keyframes lsPulse{
    0%,100%{ opacity:.7; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.06); }
  }

  /* conic arc spinner ring */
  .ls-spinner{
    position:absolute; inset:0; border-radius:50%;
    background: conic-gradient(from 0deg, transparent 50%, rgba(124,118,238,0.9) 100%);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #000 calc(100% - 2.5px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #000 calc(100% - 2.5px));
    animation: lsSpin 1.1s linear infinite;
  }
  /* outer glow ring (static) */
  .ls-spinner-track{
    position:absolute; inset:0; border-radius:50%;
    border: 1.5px solid rgba(79,70,229,0.14);
  }
  @keyframes lsSpin{ to{ transform:rotate(360deg); } }

  /* loading dots */
  .ls-dots{
    display:flex; gap:8px; align-items:center;
  }
  .ls-dots span{
    width:5px; height:5px; border-radius:50%; background:var(--indigo-soft);
    animation: lsDot 1.2s ease-in-out infinite;
    opacity:.3;
  }
  .ls-dots span:nth-child(2){ animation-delay:.18s; }
  .ls-dots span:nth-child(3){ animation-delay:.36s; }
  @keyframes lsDot{
    0%,80%,100%{ opacity:.25; transform:scale(0.8); }
    40%{ opacity:1; transform:scale(1.2); }
  }

  /* ───────────── responsive ───────────── */
  @media (max-width: 980px){
    .wrap{ padding:0 22px;}
    nav.top{ top:12px;}
  }
</style>
</head>

</svg>

<!-- WebGL smoke shader -->
<div id="smokeContainer" class="shader_component"
     data-mouse-force="8"
     data-splat-radius="0.4"
     data-density-dissipation="0.95"
     data-velocity-dissipation="0.97"
     data-pressure="0.8"
     data-density-intensity="0.04"
     data-show-gui="false"
     data-smoke-brightness="0.9"
     style="position:fixed;inset:0;z-index:3;pointer-events:none;">
  <canvas id="glcanvas" style="position:absolute;inset:0;width:100%;height:100%;display:block;mix-blend-mode:screen;"></canvas>
</div>

<!-- cursor + bg layers -->
<div class="dot-grid" aria-hidden="true"></div>
<div class="cursor-ring" id="cursorRing" aria-hidden="true"></div>
<div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>
<div class="grain" aria-hidden="true"></div>


<!-- hero -->
<header class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid-bg"></div>
  <div class="stars" id="stars" aria-hidden="true"></div>

  <!-- centered stack: mark + headline -->
  <div class="hero-stack">
    <div class="hero-model-wrap">
      <div class="model-glow"></div>
      <model-viewer
        class="hero-model"
        id="heroModel"
        src="assets/logo-3d-opt.glb"
        alt="ADAUI Studio 3D logo"
        auto-rotate
        camera-controls
        disable-zoom
        auto-rotate-delay="0"
        rotation-per-second="22deg"
        camera-orbit="0deg 80deg 120%"
        min-camera-orbit="auto 55deg 110%"
        max-camera-orbit="auto 105deg 130%"
        field-of-view="35deg"
        environment-image="neutral"
        exposure="1.8"
        shadow-intensity="0"
        interpolation-decay="200"
        loading="eager"
        reveal="auto"
      >
        <div slot="poster" class="model-poster">
          <svg viewBox="0 0 144 144" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

<script>
  // ───────────── cursor ring / dot ─────────────
  (function(){
    if (matchMedia('(hover:none)').matches) return;
    const ring = document.getElementById('cursorRing');
    const body = document.body;
    let mx = innerWidth/2, my = innerHeight/2;
    let rx = mx, ry = my;
    function sv(n,v){ body.style.setProperty(n, v+'px'); }
    sv('--mx',mx); sv('--my',my); sv('--rx',rx); sv('--ry',ry);

    addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      sv('--mx',mx); sv('--my',my);
    });
    addEventListener('mousedown', () => ring && ring.classList.add('is-click'));
    addEventListener('mouseup',   () => ring && ring.classList.remove('is-click'));
    document.querySelectorAll('[data-cursor]').forEach(el => {
      el.addEventListener('mouseenter', () => {
        ring && ring.classList.add('is-hover');
        const lbl = el.getAttribute('data-cursor-label');
        lbl ? ring.setAttribute('data-label',lbl) : ring.removeAttribute('data-label');
      });
      el.addEventListener('mouseleave', () => {
        ring && ring.classList.remove('is-hover');
        ring && ring.removeAttribute('data-label');
      });
    });

    (function tick(){
      rx += (mx - rx) * 0.18; ry += (my - ry) * 0.18;
      sv('--rx',rx); sv('--ry',ry);
      requestAnimationFrame(tick);
    })();
  })();

  // ───────────── smoke color cycler (CSS filter on WebGL canvas) ─────────────
  (function(){
    // sepia → saturate → hue-rotate converts white grayscale smoke to vivid color
    // filter is applied before mix-blend-mode:screen so colored smoke composites correctly
    const PALETTE = [
      'sepia(0)   saturate(1)   hue-rotate(0deg)   brightness(1.4)',   // white
      'sepia(0.9) saturate(5.5) hue-rotate(260deg) brightness(1.5)',   // soft purple
      'sepia(0.9) saturate(5.5) hue-rotate(195deg) brightness(1.5)',   // soft blue
      'sepia(0.9) saturate(5.0) hue-rotate(320deg) brightness(1.5)',   // soft pink
      'sepia(0.9) saturate(5.5) hue-rotate(165deg) brightness(1.5)',   // soft sky blue
    ];

    // shuffle so the first color on load is random
    for (let i = PALETTE.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [PALETTE[i], PALETTE[j]] = [PALETTE[j], PALETTE[i]];
    }

    const cv = document.getElementById('glcanvas');
    if (!cv) return;
    cv.style.transition = 'filter 1.4s ease-in-out';

    let idx = 0;
    function next() {
      cv.style.filter = PALETTE[idx];
      idx = (idx + 1) % PALETTE.length;
    }
    next();
    // cycle every 2.5s — randomise the wait slightly so it feels organic
    (function cycle(){
      setTimeout(() => { next(); cycle(); }, 2200 + Math.random() * 800);
    })();
  })();

  // ───────────── loading screen + 3D model reveal ─────────────
  (function(){
    const screen = document.getElementById('loadScreen');
    const mv     = document.getElementById('heroModel');
    if (!mv || !screen) return;

    function dismiss(){
      screen.classList.add('done');
      mv.classList.add('model-ready');
      screen.addEventListener('transitionend', () => screen.remove(), { once: true });
    }

    // wait for both: 3D model AND fonts
    const modelReady = new Promise(res => {
      if (mv.loaded) res();
      else mv.addEventListener('load', res, { once: true });
    });
    const fontsReady = document.fonts ? document.fonts.ready : Promise.resolve();

    Promise.all([modelReady, fontsReady]).then(dismiss);

    // hard fallback — never show loader for more than 12s
    setTimeout(dismiss, 12000);
  })();

  // ───────────── headline char reveal ─────────────
  (function(){
    document.querySelectorAll('[data-reveal]').forEach(el => {
      el.querySelectorAll('.row1, .row2, .line').forEach(line => {
        const html = line.innerHTML;
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        let i = 0;
        function walk(node, parent){
          if (node.nodeType === 3) {
            const txt = node.textContent;
            const frag = document.createDocumentFragment();
            for (const ch of txt){
              if (ch === ' '){ frag.appendChild(document.createTextNode(' ')); continue; }
              const s = document.createElement('span');
              s.className = 'reveal-char';
              s.style.setProperty('--i', i++);
              s.textContent = ch;
              frag.appendChild(s);
            }
            parent.appendChild(frag);
          } else if (node.nodeType === 1) {
            const clone = node.cloneNode(false);
            if (clone.classList && clone.classList.contains('inline-mark')){
              const s = document.createElement('span');
              s.className = 'reveal-char';
              s.style.setProperty('--i', i++);
              s.appendChild(node.cloneNode(true));
              parent.appendChild(s);
              return;
            }
            for (const child of node.childNodes) walk(child, clone);
            parent.appendChild(clone);
          }
        }
        const out = document.createElement('div');
        out.style.display = 'block';
        for (const child of tmp.childNodes) walk(child, out);
        line.innerHTML = '';
        while (out.firstChild) line.appendChild(out.firstChild);
      });
      requestAnimationFrame(() => el.classList.add('revealed'));
    });
  })();

  // ───────────── scroll reveal ─────────────
  (function(){
    const io = new IntersectionObserver((entries) => {
      for (const e of entries){
        if (e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
      }
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    document.querySelectorAll('.r-up').forEach(el => io.observe(el));
  })();

  // ───────────── magnetic nav CTA ─────────────
  (function(){
    document.querySelectorAll('.nav-cta').forEach(el => {
      el.addEventListener('mousemove', (e) => {
        const r = el.getBoundingClientRect();
        const x = e.clientX - r.left - r.width/2;
        const y = e.clientY - r.top  - r.height/2;
        el.style.transform = `translate(${x*0.18}px, ${y*0.25}px)`;
      });
      el.addEventListener('mouseleave', () => el.style.transform = '');
    });
  })();

  // ───────────── starfield ─────────────
  (function(){
    const stars = document.getElementById('stars');
    if (!stars) return;
    const N = 80;
    let html = '';
    for (let i = 0; i < N; i++){
      const x = Math.random()*100;
      const y = Math.random()*100;
      const s = Math.random()*1.6 + 0.6;
      const d = (Math.random()*4).toFixed(2);
      const op = (Math.random()*0.6 + 0.2).toFixed(2);
      html += `<i style="left:${x}%; top:${y}%; width:${s}px; height:${s}px; animation-delay:${d}s; opacity:${op}"></i>`;
    }
    stars.innerHTML = html;
  })();

</script>

<script src="https://cdn.jsdelivr.net/gh/Bombadaa/smoke-shader@master/script.js"></script>
<script>
  // forward document mousemove to the WebGL canvas (canvas has pointer-events:none)
  (function(){
    const cv = document.getElementById('glcanvas');
    if (!cv) return;
    document.addEventListener('mousemove', function(e){
      cv.dispatchEvent(new MouseEvent('mousemove', {
        clientX: e.clientX, clientY: e.clientY,
        bubbles: false, cancelable: true
      }));
    });
  })();
</script>
